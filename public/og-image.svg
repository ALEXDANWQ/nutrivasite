<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">NUTRIVA — счетчик калорий и дневник питания</title>
  <desc id="desc">Превью сайта Android-приложения NUTRIVA для учета питания, калорий, БЖУ, воды и веса.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fcf8"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dff4e8"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#36c978"/>
      <stop offset="1" stop-color="#159957"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="34" stdDeviation="34" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="70" width="1056" height="490" rx="48" fill="#fff" opacity="0.72" stroke="#dfe7e2"/>
  <g transform="translate(118 116)">
